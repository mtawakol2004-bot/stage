<script>
function drawWing() {
  const svg = document.getElementById('wingSvg');
  const speed = +wingSpeed.value;
  const aoa = +wingAoA.value;
  const camber = +wingCamber.value;
  const area = +wingArea.value;

  const rho = 1.225;
  const stallAngle = 14 + camber * 0.12;
  const deepLowAngle = aoa <= -1.5;
  const nearZeroNegative = aoa > -1.5 && aoa < 2;
  const isStall = aoa > stallAngle;

  let clBase = 0.11 * aoa + 0.045 * camber;
  if (isStall) {
    clBase *= clamp(1 - (aoa - stallAngle) * 0.10, 0.48, 1);
  }
  const cl = clamp(clBase, -0.9, 1.9);
  const lift = 0.5 * rho * speed * speed * area * cl / 1000;

  let state = 'Écoulement attaché';
  if (deepLowAngle) state = 'Portance inversée';
  else if (nearZeroNegative) state = 'Portance très faible';
  else if (isStall) state = 'Décrochage';
  else if (aoa > stallAngle - 2) state = 'Pré-décrochage';

  document.getElementById('wingLift').textContent = `${lift.toFixed(1)} kN`;
  document.getElementById('wingCl').textContent = `${cl.toFixed(2)}`;
  document.getElementById('wingState').textContent = state;

  const cx = 250;
  const cy = 160;
  const chord = 260;
  const angle = aoa * Math.PI / 180;
  const phase = Date.now() * (0.0010 + speed * 0.000045);
  const speedLevel = clamp(speed / 120, 0, 1);

  const rotate = (x, y) => ({
    x: cx + x * Math.cos(angle) - y * Math.sin(angle),
    y: cy + x * Math.sin(angle) + y * Math.cos(angle)
  });

  const invRotate = (x, y) => {
    const dx = x - cx;
    const dy = y - cy;
    return {
      x: dx * Math.cos(angle) + dy * Math.sin(angle),
      y: -dx * Math.sin(angle) + dy * Math.cos(angle)
    };
  };

  function airfoilSurface(xLocal, side = 'upper') {
    const t = clamp((xLocal + chord * 0.5) / chord, 0, 1);
    const camberLine = -camber * 1.9 * Math.sin(Math.PI * t);
    const yt = -(5 + 17 * Math.sin(Math.PI * t) * (0.84 - 0.27 * t));
    const yb =  2 +  7 * Math.sin(Math.PI * t) * (0.66 + 0.20 * t);
    return side === 'upper' ? camberLine + yt : camberLine + yb;
  }

  let profile = '';
  const upperPts = [];
  const lowerPts = [];

  for (let i = 0; i <= 64; i++) {
    const t = i / 64;
    const x = -chord * 0.5 + t * chord;
    const y = airfoilSurface(x, 'upper');
    const p = rotate(x, y);
    upperPts.push(p);
    profile += (i === 0 ? 'M ' : ' L ') + p.x.toFixed(2) + ' ' + p.y.toFixed(2);
  }

  for (let i = 64; i >= 0; i--) {
    const t = i / 64;
    const x = -chord * 0.5 + t * chord;
    const y = airfoilSurface(x, 'lower');
    const p = rotate(x, y);
    lowerPts.push(p);
    profile += ' L ' + p.x.toFixed(2) + ' ' + p.y.toFixed(2);
  }
  profile += ' Z';

  const heatX0 = 32;
  const heatY0 = 42;
  const heatW = 600;
  const heatH = 210;
  const nx = 92;
  const ny = 34;
  const cellW = heatW / nx;
  const cellH = heatH / ny;

  let heatRects = '';
  let vortRects = '';

  for (let j = 0; j < ny; j++) {
    for (let i = 0; i < nx; i++) {
      const x = heatX0 + i * cellW + cellW * 0.5;
      const y = heatY0 + j * cellH + cellH * 0.5;

      const loc = invRotate(x, y);
      const xL = loc.x;
      const yL = loc.y;

      const tChord = (xL + chord * 0.5) / chord;
      const insideChord = tChord >= 0 && tChord <= 1;

      const yu = airfoilSurface(xL, 'upper');
      const yl = airfoilSurface(xL, 'lower');
      const insideAirfoil = insideChord && yL >= yu && yL <= yl;

      if (insideAirfoil) continue;

      const distUp = Math.abs(yL - yu);
      const distLow = Math.abs(yL - yl);
      const nearUpper = insideChord ? Math.exp(-Math.pow(distUp / 14, 2)) : 0;
      const nearLower = insideChord ? Math.exp(-Math.pow(distLow / 16, 2)) : 0;

      const lead = Math.exp(-Math.pow((xL + chord * 0.45) / 18, 2));
      const mid = Math.exp(-Math.pow((xL - 0) / 110, 2));
      const trail = Math.exp(-Math.pow((xL - chord * 0.32) / 36, 2));

      let upperBoost = clamp(0.22 + 0.62 * speedLevel + 0.018 * Math.max(0, aoa), 0.20, 0.95);
      let lowerBoost = clamp(0.18 + 0.28 * speedLevel + 0.012 * Math.max(0, aoa), 0.16, 0.72);

      if (deepLowAngle) {
        const tmp = upperBoost;
        upperBoost = 0.20;
        lowerBoost = Math.min(0.95, tmp + 0.18);
      }

      if (isStall) {
        upperBoost *= 0.72;
      }

      let vel = 0.58 + 0.10 * speedLevel;
      vel += nearUpper * (upperBoost * (0.9 + 0.45 * lead + 0.25 * mid));
      vel -= nearLower * (0.12 + 0.10 * lowerBoost);

      if (deepLowAngle) {
        vel += nearLower * (0.60 + 0.25 * lead);
        vel -= nearUpper * 0.20;
      } else {
        vel += nearLower * (0.10 + 0.16 * lowerBoost);
      }

      if (isStall && xL > chord * 0.10 && yL < yu + 22) {
        vel -= 0.22 * Math.exp(-Math.pow((xL - chord * 0.28) / 58, 2));
      }

      if (xL > chord * 0.42) {
        const wakeCore = Math.exp(-Math.pow((yL - (isStall ? -10 : 0)) / (isStall ? 26 : 18), 2));
        vel -= wakeCore * (isStall ? 0.26 : 0.10) * Math.exp(-(xL - chord * 0.42) / 120);
      }

      vel = clamp(vel, 0, 1);

      let vort = 0;
      vort += nearUpper * (0.018 + 0.020 * upperBoost);
      vort -= nearLower * (0.016 + 0.018 * lowerBoost);

      if (deepLowAngle) vort *= -1;

      if (xL > chord * 0.35) {
        const wakeAmp = isStall ? 0.034 : 0.014;
        const wakeOsc = Math.sin((xL - chord * 0.35) * 0.085 - phase * 3.2 + yL * 0.06);
        const wakeEnv = Math.exp(-Math.pow((yL - (isStall ? -6 : 0)) / (isStall ? 30 : 22), 2))
                      * Math.exp(-(xL - chord * 0.35) / 170);
        vort += wakeAmp * wakeOsc * wakeEnv;
      }

      const velColor = colorMap(vel);

      const vortNorm = clamp((vort + 0.04) / 0.08, 0, 1);
      let vr = 0, vg = 0, vb = 0;
      if (vortNorm < 0.5) {
        const u = vortNorm / 0.5;
        vr = Math.round(80 * (1 - u));
        vg = Math.round(220 * u + 40 * (1 - u));
        vb = 255;
      } else {
        const u = (vortNorm - 0.5) / 0.5;
        vr = 255;
        vg = Math.round(220 * (1 - u));
        vb = Math.round(255 * (1 - u) + 90 * u);
      }
      const vortColor = `rgb(${vr},${vg},${vb})`;

      heatRects += `<rect x="${(x - cellW*0.55).toFixed(2)}" y="${(y - cellH*0.55).toFixed(2)}"
                     width="${(cellW*1.10).toFixed(2)}" height="${(cellH*1.10).toFixed(2)}"
                     fill="${velColor}" opacity="0.95"/>`;

      vortRects += `<rect x="${(x - cellW*0.55).toFixed(2)}" y="${(y + 20 - cellH*0.55).toFixed(2)}"
                     width="${(cellW*1.10).toFixed(2)}" height="${(cellH*1.10).toFixed(2)}"
                     fill="${vortColor}" opacity="0.92"/>`;
    }
  }

  let wakePath = '';
  if (isStall) {
    let d = '';
    for (let k = 0; k <= 40; k++) {
      const xx = 360 + k * 7;
      const yy = 152 + Math.sin(k * 0.55 - phase * 3.0) * (8 + k * 0.35);
      d += (k === 0 ? 'M ' : ' L ') + xx.toFixed(1) + ' ' + yy.toFixed(1);
    }
    wakePath = `
      <path d="${d}" fill="none" stroke="rgba(255,140,60,0.75)" stroke-width="7" opacity="0.35"/>
      <path d="${d}" fill="none" stroke="rgba(255,180,90,0.95)" stroke-width="2.2" opacity="0.95"/>
    `;
  }

  const liftColor = cl >= 0 ? '#22c55e' : '#ef4444';
  const liftMag = clamp(18 + Math.abs(lift) * 0.28, 24, 56);

  const liftBase = rotate(10, -8);
  const liftY2 = cl >= 0 ? liftBase.y - liftMag : liftBase.y + liftMag;

  const stateText = deepLowAngle
    ? 'Incidence négative : la dépression passe sous le profil'
    : isStall
      ? 'Décrochage : sillage tourbillonnaire et perte de succion sur l’extrados'
      : aoa > stallAngle - 2
        ? 'Pré-décrochage : fort gradient de vitesse au-dessus du profil'
        : 'Écoulement attaché : vitesse plus élevée sur l’extrados';

  svg.innerHTML = `
    <defs>
      <linearGradient id="airfoilFillNew" x1="0" x2="1">
        <stop offset="0%" stop-color="rgba(245,245,245,0.95)"/>
        <stop offset="100%" stop-color="rgba(180,220,255,0.75)"/>
      </linearGradient>
      <marker id="wingLiftArrowCFD" markerWidth="9" markerHeight="9" refX="7.2" refY="4.5" orient="auto">
        <path d="M0,0 L9,4.5 L0,9 z" fill="${liftColor}"></path>
      </marker>
      <marker id="flowArrowCFD" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
        <path d="M0,0 L9,4.5 L0,9 z" fill="#f8fafc"></path>
      </marker>
    </defs>

    <rect x="18" y="20" width="664" height="280" rx="22" fill="rgba(255,255,255,0.025)" stroke="rgba(255,255,255,0.06)"/>

    <!-- panneau vitesse -->
    <rect x="${heatX0}" y="${heatY0}" width="${heatW}" height="${heatH}" fill="rgba(10,10,10,0.90)" stroke="rgba(255,255,255,0.10)"/>
    ${heatRects}

    <!-- aile -->
    <path d="${profile}" fill="url(#airfoilFillNew)" stroke="#dbeafe" stroke-width="3"/>

    <!-- wake -->
    ${wakePath}

    <!-- flux incident -->
    <line x1="46" y1="62" x2="120" y2="62" stroke="#f8fafc" stroke-width="3" marker-end="url(#flowArrowCFD)"/>
    <text x="48" y="48" fill="#f8fafc" font-size="13">flux incident</text>

    <!-- portance -->
    <line x1="${liftBase.x.toFixed(1)}" y1="${liftBase.y.toFixed(1)}"
          x2="${liftBase.x.toFixed(1)}" y2="${liftY2.toFixed(1)}"
          stroke="${liftColor}" stroke-width="3.8" marker-end="url(#wingLiftArrowCFD)"/>
    <text x="${(liftBase.x + 8).toFixed(1)}" y="${(cl >= 0 ? liftY2 - 6 : liftY2 + 16).toFixed(1)}"
          fill="${liftColor}" font-size="13">portance</text>

    <!-- angle -->
    <line x1="92" y1="220" x2="${(92 + 42 * Math.cos(-angle)).toFixed(1)}" y2="${(220 + 42 * Math.sin(-angle)).toFixed(1)}"
          stroke="#facc15" stroke-width="2.4"/>
    <path d="M 120 220 A 28 28 0 0 0 ${(120 + 28 * Math.cos(-angle)).toFixed(1)} ${(220 + 28 * Math.sin(-angle)).toFixed(1)}"
          fill="none" stroke="#facc15" stroke-width="2"/>
    <text x="86" y="244" fill="#fde68a" font-size="12.5">α = ${aoa.toFixed(1).replace('.0','')}°</text>

    <!-- légende vitesse -->
    <rect x="520" y="34" width="118" height="74" rx="12" fill="rgba(0,0,0,0.55)" stroke="rgba(255,255,255,0.08)"/>
    <text x="536" y="52" fill="#f8fafc" font-size="12.5">Vitesse</text>
    <rect x="536" y="62" width="14" height="32" fill="${colorMap(0.05)}"/>
    <rect x="550" y="62" width="14" height="32" fill="${colorMap(0.25)}"/>
    <rect x="564" y="62" width="14" height="32" fill="${colorMap(0.50)}"/>
    <rect x="578" y="62" width="14" height="32" fill="${colorMap(0.72)}"/>
    <rect x="592" y="62" width="14" height="32" fill="${colorMap(0.92)}"/>
    <text x="612" y="72" fill="#e2e8f0" font-size="11">forte</text>
    <text x="612" y="90" fill="#e2e8f0" font-size="11">faible</text>

    <text x="38" y="276" fill="${deepLowAngle ? '#fda4af' : isStall ? '#fdba74' : '#a5f3fc'}" font-size="13.5">${stateText}</text>
  `;
}
</script>
