<script>
function drawCFD() {
  const canvas = document.getElementById('cfdCanvas');
  const ctx = canvas.getContext('2d');

  const flow = +cfdSpeed.value;
  const neck = +cfdViscosity.value;
  const channelH = +cfdObstacle.value;
  const mix = +cfdTurbulence.value;

  const w = canvas.width;
  const h = canvas.height;

  ctx.clearRect(0, 0, w, h);

  const topBase = 60;
  const cx = w * 0.5;
  const throatHalf = 50 - neck * 3;
  const entryHalf = channelH + 35;

  const topWall = (x) => {
    const d = Math.abs(x - cx) / 170;
    const smooth = Math.exp(-d * d);
    return topBase + (entryHalf - throatHalf) * smooth;
  };

  const bottomWall = (x) => h - topWall(x);
  const gapAt = (x) => bottomWall(x) - topWall(x);

  // fond plus propre
  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, 'rgba(8,15,32,1)');
  bg.addColorStop(0.5, 'rgba(10,20,42,1)');
  bg.addColorStop(1, 'rgba(5,10,25,1)');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  // halo central léger
  const glow = ctx.createRadialGradient(cx, h / 2, 20, cx, h / 2, 240);
  glow.addColorStop(0, 'rgba(56,189,248,0.08)');
  glow.addColorStop(1, 'rgba(56,189,248,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, w, h);

  // parois
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  for (let x = 0; x <= w; x += 8) ctx.lineTo(x, topWall(x));
  ctx.lineTo(w, 0);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0, h);
  for (let x = 0; x <= w; x += 8) ctx.lineTo(x, bottomWall(x));
  ctx.lineTo(w, h);
  ctx.closePath();
  ctx.fill();

  // contour plus doux
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = 2.5;

  ctx.beginPath();
  for (let x = 0; x <= w; x += 4) {
    const y = topWall(x);
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.beginPath();
  for (let x = 0; x <= w; x += 4) {
    const y = bottomWall(x);
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // petites lignes de grille très discrètes
  ctx.strokeStyle = 'rgba(255,255,255,0.035)';
  ctx.lineWidth = 1;
  for (let gy = 40; gy <= h - 40; gy += 30) {
    ctx.beginPath();
    ctx.moveTo(30, gy);
    ctx.lineTo(w - 30, gy);
    ctx.stroke();
  }

  // lignes d'écoulement plus propres
  for (let j = 0; j < 16; j++) {
    const yn = j / 15;
    ctx.beginPath();

    for (let x = 0; x <= w; x += 8) {
      const top = topWall(x);
      const gap = gapAt(x);
      const centerBias = 1 - Math.pow(2 * yn - 1, 2);
      const accel = (2 * entryHalf) / Math.max(gap, 20);
      const wiggle = Math.sin((x / 65) + j * 0.75 + Date.now() * 0.0015 * mix) * mix * 0.22;
      const y = top + yn * gap + wiggle * (0.35 + centerBias * 0.65);

      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    const localSpeed = flow * (0.55 + 0.45 * (1 - Math.abs(yn - 0.5) * 2));
    const t = Math.max(0, Math.min(1, localSpeed / 10));
    ctx.strokeStyle = colorMap(t).replace('rgb', 'rgba').replace(')', ',0.78)');
    ctx.lineWidth = 1.8;
    ctx.stroke();
  }

  // particules plus propres
  for (let i = 0; i < 140; i++) {
    const x = (i * 18 + Date.now() * 0.06 * flow) % (w + 30) - 15;
    const lane = i % 16;
    const yn = lane / 15;
    const top = topWall(x);
    const gap = gapAt(x);
    const centerBias = 1 - Math.pow(2 * yn - 1, 2);
    const accel = (2 * entryHalf) / Math.max(gap, 20);
    const localSpeed = flow * (0.5 + 0.95 * centerBias) * accel;
    const y = top + yn * gap;

    const t = Math.max(0, Math.min(1, localSpeed / 12));
    const radius = 1.8 + centerBias * 1.2;

    ctx.beginPath();
    ctx.fillStyle = colorMap(t);
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // zone de rétrécissement légèrement mise en valeur
  const zoneGlow = ctx.createLinearGradient(cx - 90, 0, cx + 90, 0);
  zoneGlow.addColorStop(0, 'rgba(56,189,248,0)');
  zoneGlow.addColorStop(0.5, 'rgba(56,189,248,0.08)');
  zoneGlow.addColorStop(1, 'rgba(56,189,248,0)');
  ctx.fillStyle = zoneGlow;
  ctx.fillRect(cx - 90, 35, 180, h - 70);

  const vmax = (flow * (2 * entryHalf) / Math.max(2 * throatHalf, 20));
  document.getElementById('cfdRe').textContent = `${vmax.toFixed(1)}`;
  document.getElementById('cfdWake').textContent = 'Centre du rétrécissement';

  // légende
  const lg = ctx.createLinearGradient(470, 22, 650, 22);
  lg.addColorStop(0, '#1d4ed8');
  lg.addColorStop(0.5, '#22d3ee');
  lg.addColorStop(0.75, '#facc15');
  lg.addColorStop(1, '#ef4444');

  ctx.fillStyle = lg;
  ctx.fillRect(470, 28, 180, 10);
  ctx.strokeStyle = 'rgba(255,255,255,0.16)';
  ctx.strokeRect(470, 28, 180, 10);

  ctx.fillStyle = 'rgba(255,255,255,0.82)';
  ctx.font = '13px Arial';
  ctx.fillText('lent', 470, 20);
  ctx.fillText('rapide', 610, 20);
}

function drawGears() {
  const svg = document.getElementById('gearSvg');
  const z1 = +gear1Teeth.value;
  const z2 = +gear2Teeth.value;
  const n1 = +gearSpeed.value;
  const torque = +gearTorque.value;

  const ratio = z1 / z2;
  const out = n1 * ratio;

  document.getElementById('gearRatio').textContent = `${ratio.toFixed(2)}`;
  document.getElementById('gearOutput').textContent = `${out.toFixed(1)} rpm`;

  const r1 = 45 + z1 * 1.4;
  const r2 = 45 + z2 * 1.0;
  const c1x = 220;
  const c2x = 220 + r1 + r2 - 10;
  const cy = 160;
  const phase = Date.now() / 850;
  const thickness = clamp(torque / 22, 2.5, 6);

  svg.innerHTML = `
    <defs>
      <radialGradient id="gearBg" cx="50%" cy="50%" r="60%">
        <stop offset="0%" stop-color="rgba(56,189,248,0.08)" />
        <stop offset="55%" stop-color="rgba(139,92,246,0.05)" />
        <stop offset="100%" stop-color="rgba(15,23,42,0)" />
      </radialGradient>

      <radialGradient id="gear1Fill" cx="35%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#bfe9ff" />
        <stop offset="45%" stop-color="#5cccf6" />
        <stop offset="100%" stop-color="#1e7496" />
      </radialGradient>

      <radialGradient id="gear2Fill" cx="35%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#ddd6fe" />
        <stop offset="45%" stop-color="#a78bfa" />
        <stop offset="100%" stop-color="#6d48d7" />
      </radialGradient>

      <filter id="softGlow">
        <feGaussianBlur stdDeviation="4" result="blur"/>
      </filter>
    </defs>

    <rect x="22" y="24" width="656" height="272" rx="22"
          fill="rgba(255,255,255,0.025)"
          stroke="rgba(255,255,255,0.06)" />

    <ellipse cx="350" cy="160" rx="245" ry="110" fill="url(#gearBg)" />

    <line x1="${c1x}" y1="${cy}" x2="${c2x}" y2="${cy}"
          stroke="rgba(255,255,255,0.08)" stroke-width="6" />

    <circle cx="${c1x}" cy="${cy}" r="${r1 + 10}"
            fill="rgba(56,189,248,0.07)" filter="url(#softGlow)" />
    <circle cx="${c2x}" cy="${cy}" r="${r2 + 10}"
            fill="rgba(139,92,246,0.07)" filter="url(#softGlow)" />

    <path d="${gearPath(c1x, cy, r1, z1, phase)}"
          fill="url(#gear1Fill)"
          stroke="rgba(255,255,255,0.38)"
          stroke-width="${thickness}" />

    <path d="${gearPath(c2x, cy, r2, z2, -phase * ratio)}"
          fill="url(#gear2Fill)"
          stroke="rgba(255,255,255,0.34)"
          stroke-width="${thickness}" />

    <circle cx="${c1x}" cy="${cy}" r="${r1 * 0.64}"
            fill="rgba(15,23,42,0.55)"
            stroke="rgba(255,255,255,0.14)"
            stroke-width="2" />

    <circle cx="${c2x}" cy="${cy}" r="${r2 * 0.64}"
            fill="rgba(15,23,42,0.55)"
            stroke="rgba(255,255,255,0.14)"
            stroke-width="2" />

    <circle cx="${c1x}" cy="${cy}" r="13" fill="#f8fafc" />
    <circle cx="${c2x}" cy="${cy}" r="13" fill="#f8fafc" />

    <line x1="${c1x}" y1="${cy}"
          x2="${c1x + r1 * 0.68 * Math.cos(phase)}"
          y2="${cy + r1 * 0.68 * Math.sin(phase)}"
          stroke="#eff6ff" stroke-width="4" stroke-linecap="round" />

    <line x1="${c2x}" y1="${cy}"
          x2="${c2x + r2 * 0.68 * Math.cos(-phase * ratio)}"
          y2="${cy + r2 * 0.68 * Math.sin(-phase * ratio)}"
          stroke="#f5f3ff" stroke-width="4" stroke-linecap="round" />

    <circle cx="${c1x}" cy="${cy}" r="${r1 + 5}"
            fill="none"
            stroke="rgba(125,211,252,0.18)"
            stroke-width="1.8" />

    <circle cx="${c2x}" cy="${cy}" r="${r2 + 5}"
            fill="none"
            stroke="rgba(196,181,253,0.18)"
            stroke-width="1.8" />
  `;

  requestAnimationFrame(drawGears);
}
</script>
